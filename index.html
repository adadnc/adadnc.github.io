<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BESİzle — Bireysel Emeklilik Takip Sistemi</title>
  <meta name="description" content="BESİzle — Bireysel Emeklilik Sistemi (BES) birikimlerinizi web ve mobilde tek bakışta takip edin.">
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
  <!-- Schriften lokal selbst gehostet (IBM Plex Sans + Space Grotesk) — funktioniert offline -->
  <link rel="stylesheet" href="assets/fonts.css">
  <style>
    /* ---- Web-UI ile birebir arka plan (APIDeposu light theme) ---- */
    :root{
      --background: 0 0% 100%;
      --foreground: 222.2 84% 4.9%;
      --muted-foreground: 215.4 16.3% 46.9%;
      --font-sans: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-heading: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body{ height:100%; }
    body{
      font-family:var(--font-sans);
      background-color:hsl(var(--background));
      color:hsl(var(--foreground));
      min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      position:relative; overflow:hidden;
      -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
    }

    /* Grid Background (Web-UI ile aynı) */
    body::before{
      content:""; position:fixed; inset:0; pointer-events:none; z-index:-2;
      background-image:url('assets/pattern-bg.svg');
      background-size:200px 200px; background-repeat:repeat;
      color:hsl(var(--foreground));
    }
    /* Gradient Overlays (Web-UI ile aynı) */
    body::after{
      content:""; position:fixed; inset:0; pointer-events:none; z-index:-1;
      background:
        radial-gradient(900px 320px at 15% -10%, hsl(var(--foreground) / 0.03), transparent 60%),
        radial-gradient(900px 320px at 85% 0%, hsl(var(--foreground) / 0.025), transparent 60%);
    }

    .hero{ text-align:center; padding:24px; }
    .hero .logo{ width:min(210px, 48vw); height:auto; display:block; margin:0 auto; }
    .brand{ font-family:var(--font-heading); font-weight:700; font-size:clamp(32px, 6.4vw, 54px); letter-spacing:-1px; line-height:1; color:hsl(var(--foreground)); margin-top:20px; }
    .rule{ width:56px; height:3px; border-radius:2px; background:hsl(var(--foreground)); margin:24px auto 20px; }
    .tagline{
      font-family:var(--font-heading); font-weight:600;
      font-size:clamp(15px, 2.6vw, 21px); letter-spacing:.3px; line-height:1.35;
      color:hsl(var(--muted-foreground));
    }
    .sub{
      margin-top:11px; font-family:var(--font-sans); font-weight:400;
      font-size:clamp(12px, 1.9vw, 14px); color:hsl(var(--muted-foreground) / .85);
    }
  </style>
</head>
<body>
  <main class="hero">
    <img class="logo" src="assets/logo.svg" alt="BESİzle">
    <h1 class="brand">BESİzle</h1>
    <div class="rule"></div>
    <p class="tagline">Bireysel Emeklilik Takip Sistemi</p>
    <p class="sub">Emekliliğiniz, tek bakışta.</p>
  </main>
</body>
</html>
